<style>
  .june-shell {
    display: grid;
    gap: 1rem;
  }

  .june-code {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
  }

  .june-oven-list {
    display: grid;
    gap: 0.75rem;
  }

  .june-oven-card .form-group {
    margin-bottom: 0.75rem;
  }

  .june-oven-card .form-check {
    margin-bottom: 0.5rem;
  }
</style>

<div class="june-shell">
  <div>
    <h4 class="mb-2">June Oven Pairing</h4>
    <p class="text-muted mb-3">Pair a June oven directly from Homebridge. The oven must be idle, closed, online, and ready for a new companion code.</p>
    <button id="pairButton" class="btn btn-primary">Pair a new June oven</button>
  </div>

  <div id="pairCard" class="card d-none">
    <div class="card-body">
      <div class="text-muted mb-1">On your oven, open Settings -> Connect and enter:</div>
      <div id="pairCode" class="june-code mb-2"></div>
      <div id="pairState" class="text-muted">Waiting for the oven...</div>
    </div>
  </div>

  <div>
    <h5 class="mb-2">Paired ovens</h5>
    <div id="ovenList" class="june-oven-list text-muted">Loading...</div>
  </div>
</div>

<script>
  const pairButton = document.getElementById('pairButton');
  const pairCard = document.getElementById('pairCard');
  const pairCode = document.getElementById('pairCode');
  const pairState = document.getElementById('pairState');
  const ovenList = document.getElementById('ovenList');
  let currentConfig = [];
  let pollTimer;

  const MODES = [
    { value: 'bake', label: 'Bake' },
    { value: 'roast', label: 'Roast' },
    { value: 'broil', label: 'Broil' },
    { value: 'air_fry', label: 'Air Fry' },
  ];

  async function loadConfig() {
    currentConfig = await homebridge.getPluginConfig();
    if (!currentConfig.length) {
      currentConfig = [{ platform: 'JuneOven', name: 'June', ovens: [] }];
    }
    currentConfig[0].ovens = currentConfig[0].ovens || [];
    renderOvens();
  }

  function renderOvens() {
    const ovens = currentConfig[0].ovens || [];
    if (!ovens.length) {
      ovenList.innerHTML = '<span>No ovens paired yet.</span>';
      return;
    }
    ovenList.innerHTML = ovens.map((oven, index) => ovenCardHtml(oven, index)).join('');
    ovens.forEach((oven, index) => bindOvenCard(index));
  }

  function ovenCardHtml(oven, index) {
    const modeOptions = MODES.map(mode =>
      `<option value="${mode.value}"${oven.defaultMode === mode.value ? ' selected' : ''}>${mode.label}</option>`,
    ).join('');
    return `
      <div class="card june-oven-card" data-index="${index}">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <strong>${escapeHtml(oven.name || 'June')}</strong>
            <button class="btn btn-sm btn-outline-danger remove-oven" data-index="${index}" type="button">Remove</button>
          </div>
          <div class="small text-muted mb-3">Oven ID: ${escapeHtml(oven.ovenId || '')}</div>

          <div class="form-group">
            <label>Thermostat Name</label>
            <input type="text" class="form-control field-name" value="${escapeHtml(oven.name || 'June')}">
          </div>

          <div class="form-group">
            <label>Preheat Switch Name</label>
            <input type="text" class="form-control field-preheatSwitchName" value="${escapeHtml(oven.preheatSwitchName ?? 'June Preheat')}" placeholder="Leave blank to disable">
            <small class="form-text text-muted">Leave blank to disable the preheat switch.</small>
          </div>

          <div class="form-check">
            <input type="checkbox" class="form-check-input field-readySensor" ${oven.readySensor !== false ? 'checked' : ''}>
            <label class="form-check-label">Ready sensor</label>
          </div>

          <div class="form-check">
            <input type="checkbox" class="form-check-input field-doneSensor" ${oven.doneSensor !== false ? 'checked' : ''}>
            <label class="form-check-label">Done sensor</label>
          </div>

          <div class="form-group">
            <label>Default Cook Mode</label>
            <select class="form-control field-defaultMode">${modeOptions}</select>
          </div>

          <div class="form-group">
            <label>Default Preheat Temp (F)</label>
            <input type="number" class="form-control field-defaultTempF" min="100" max="500" value="${oven.defaultTempF ?? 350}">
          </div>

          <div class="form-group">
            <label>Display Units</label>
            <select class="form-control field-tempUnit">
              <option value="F"${(oven.tempUnit || 'F') === 'F' ? ' selected' : ''}>Fahrenheit</option>
              <option value="C"${oven.tempUnit === 'C' ? ' selected' : ''}>Celsius</option>
            </select>
          </div>
        </div>
      </div>`;
  }

  function bindOvenCard(index) {
    const card = ovenList.querySelector(`.june-oven-card[data-index="${index}"]`);
    if (!card) return;

    const bindings = [
      ['.field-name', 'name', 'value'],
      ['.field-preheatSwitchName', 'preheatSwitchName', 'value'],
      ['.field-readySensor', 'readySensor', 'checked'],
      ['.field-doneSensor', 'doneSensor', 'checked'],
      ['.field-defaultMode', 'defaultMode', 'value'],
      ['.field-tempUnit', 'tempUnit', 'value'],
    ];
    for (const [selector, key, prop] of bindings) {
      const el = card.querySelector(selector);
      el.addEventListener('change', () => updateOven(index, key, prop === 'checked' ? el.checked : el.value));
    }

    const tempEl = card.querySelector('.field-defaultTempF');
    tempEl.addEventListener('change', () => updateOven(index, 'defaultTempF', Number(tempEl.value) || 350));

    card.querySelector('.remove-oven').addEventListener('click', () => removeOven(index));
  }

  async function updateOven(index, key, value) {
    const ovens = currentConfig[0].ovens;
    ovens[index] = { ...ovens[index], [key]: value };
    await homebridge.updatePluginConfig(currentConfig);
    await homebridge.savePluginConfig();
    if (key === 'name') {
      renderOvens();
    }
  }

  async function removeOven(index) {
    const oven = currentConfig[0].ovens[index];
    if (!window.confirm(`Remove ${oven.name || 'this oven'}? Its HomeKit accessories will be removed on next restart.`)) {
      return;
    }
    currentConfig[0].ovens.splice(index, 1);
    await homebridge.updatePluginConfig(currentConfig);
    await homebridge.savePluginConfig();
    renderOvens();
  }

  async function beginPairing() {
    pairButton.disabled = true;
    pairState.textContent = 'Starting pairing...';
    pairCard.classList.remove('d-none');
    try {
      const status = await homebridge.request('/pair/begin', { deviceName: 'Homebridge June' });
      showStatus(status);
      pollTimer = setInterval(() => pollStatus(status.id), 2500);
    } catch (error) {
      pairButton.disabled = false;
      pairState.textContent = error.message || String(error);
    }
  }

  async function pollStatus(id) {
    const status = await homebridge.request('/pair/status', { id });
    showStatus(status);
    if (status.state === 'paired') {
      clearInterval(pollTimer);
      await saveOven(status.oven);
      pairButton.disabled = false;
      pairState.textContent = 'Paired. Restart Homebridge to load the accessory.';
    }
    if (status.state === 'failed') {
      clearInterval(pollTimer);
      pairButton.disabled = false;
    }
  }

  function showStatus(status) {
    if (status.shownCode) {
      pairCode.textContent = `${status.shownCode.slice(0, 4)} ${status.shownCode.slice(4)}`;
    }
    const labels = {
      starting: 'Starting pairing...',
      'waiting-for-oven': 'Waiting for the oven...',
      'posting-companion': 'Securing the companion key...',
      'waiting-for-associated': 'Waiting for the oven to finish pairing...',
      paired: 'Paired.',
      failed: status.error || 'Pairing failed.',
    };
    pairState.textContent = labels[status.state] || status.state;
  }

  async function saveOven(oven) {
    if (!oven) return;
    currentConfig[0].ovens = currentConfig[0].ovens || [];
    const index = currentConfig[0].ovens.findIndex(existing => existing.ovenId === oven.ovenId);
    if (index >= 0) {
      currentConfig[0].ovens[index] = { ...currentConfig[0].ovens[index], ...oven };
    } else {
      currentConfig[0].ovens.push(oven);
    }
    await homebridge.updatePluginConfig(currentConfig);
    await homebridge.savePluginConfig();
    await loadConfig();
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
  }

  pairButton.addEventListener('click', beginPairing);
  loadConfig();
</script>
